name: smart_wifi_analyzer
description: Smart Wi-Fi Network Analyzer
version: 1.0.0+1
environment:
  sdk: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  wifi_scan: ^0.4.1+2
  network_info_plus: ^6.0.0
  wifi_info_enhanced: ^2.1.1
  permission_handler: ^11.3.1
  fl_chart: ^0.69.0
  go_router: ^14.2.0
  flutter_internet_speed_test_pro: ^1.5.1
  http: ^1.2.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  ip_go: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.5.2
  riverpod_generator: ^2.3.10
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
